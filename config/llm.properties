# API Keys (use environment variables in production)
# These can be overridden by environment variables with the same name
anthropic.api_key=${ANTHROPIC_API_KEY}
openai.api_key=${OPENAI_API_KEY}
google.api_key=${GOOGLE_API_KEY}
huggingface.api_key=${HUGGINGFACE_API_KEY}
aws.access_key_id=${AWS_ACCESS_KEY_ID}
aws.secret_access_key=${AWS_SECRET_ACCESS_KEY}

# Global Settings
llm.default.provider=mock
llm.default.model=mock-model
llm.history.size=50
llm.retry.max_attempts=3
llm.retry.backoff_factor=2

# Logging
llm.log.level=INFO
llm.log.file=logs/llm.log

# Rate Limiting
llm.rate_limit.enabled=false
llm.rate_limit.requests_per_minute=60

# Timeout Settings
llm.timeout.connect=10
llm.timeout.read=30

# Application Settings
app.name=Abhikarta LLM System
